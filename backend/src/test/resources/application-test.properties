# On utilise H2 en mémoire (plus rapide, n'écrase pas ta vraie BDD)
spring.datasource.url=jdbc:h2:mem:petconnect_test;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate crée les tables au début du test et les supprime à la fin
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Une valeur bidon pour le JWT en test (pas besoin de .env ici)
JWT_SECRET=CeciEstUneCleDeTestTresLonguePourLeHachageHS512

# Cloudinary en test (valeurs bidon, on ne fait pas de vrais uploads en test)
CLOUDINARY_CLOUD_NAME=test
CLOUDINARY_API_KEY=test
CLOUDINARY_API_SECRET=test