# Nom de l'application
spring.application.name=petconnect-api

# Connexion à PostgreSQL (Docker)
spring.datasource.url=jdbc:postgresql://localhost:5432/petconnect
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Aide Hibernate à ne pas paniquer s'il ne peut pas lire les métadonnées JDBC au millième de seconde
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false

# JWT Security Configuration
petconnect.app.jwtSecret=${JWT_SECRET:}
# Expiration : 86400000 ms = 24 heures
petconnect.jwtExpirationMs=86400000

# Importation de la configuration depuis un fichier .env (optionnel)
spring.config.import=optional:file:.env[.properties]

# Configuration de Cloudinary
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}

# Limitation de la taille des fichiers uploadés (5MB)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB