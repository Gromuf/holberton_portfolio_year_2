# Nom de l'application
spring.application.name=petconnect-api

# Connexion à PostgreSQL (Docker)
spring.datasource.url=jdbc:postgresql://localhost:5432/petconnect
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Aide Hibernate à ne pas paniquer s'il ne peut pas lire les métadonnées JDBC au millième de seconde
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false